{% extends "base.html" %}
{% block title %}Validar programación · AnesthesiaCopilot{% endblock %}
{% block content %}
<h1>Validar programación</h1>
<hr>
{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post" enctype="multipart/form-data">
    <label for="workbook">Programación Excel</label>
    <input id="workbook" name="workbook" type="file" accept=".xlsx" required>
    <button type="submit">Validar</button>
</form>
{% endblock %}
